spring.application.name=mmbank

# Fazendo o bind das variáveis do .env para o DatabaseProperties
db.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB}
db.username=${POSTGRES_USER}
db.password=${POSTGRES_PASSWORD}
db.port=${POSTGRES_PORT:5432}

# Configurações do Spring Datasource (usando as propriedades validadas acima indiretamente)
spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
# !!!!!Caminho absoluto do compose.yaml para não ter erro na minha máquina (não upar pro git, quem estiver lendo isso apague a linha abaixo)!!!!
spring.docker.compose.file=/home/henrique/IdeaProjects/Murta-Master-Bank/backendMMBank/compose.yaml

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect